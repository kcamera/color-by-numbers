# Source of truth for the Xcode project. Regenerate after editing:
#   cd App && xcodegen
# The generated .xcodeproj is gitignored on purpose — this file is what we
# review and version.
name: ColorByNumbers
options:
  bundleIdPrefix: com.kcamera
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# Project-level so every target (app + UI-test runner) signs the same way.
# Committing the Team ID is fine — it ships inside every app binary anyway.
settings:
  base:
    DEVELOPMENT_TEAM: 7L38U9696P
    CODE_SIGN_STYLE: Automatic

packages:
  ColorByNumbersPackage:
    path: ..

targets:
  ColorByNumbers:
    type: application
    platform: iOS
    sources:
      - path: ColorByNumbers
        excludes:
          - Resources
      # Starter templates (and future bundled assets) are declared as an
      # explicit resources phase rather than trusting extension inference.
      - path: ColorByNumbers/Resources
        buildPhase: resources
    dependencies:
      - package: ColorByNumbersPackage
        product: CBNKit
    info:
      path: ColorByNumbers/Info.plist
      properties:
        CFBundleDisplayName: Color by Numbers
        UILaunchScreen: {}
        # Landscape only + full screen: one layout, no Split View/Stage
        # Manager, Pencil home is always the top edge. Locked design decision.
        UIRequiresFullScreen: true
        # Always light: the desk/paper aesthetic is inherently light
        # (DESIGN.md), and PencilKit derives light/dark ink-color pairs
        # from ambient traits — a dark trait anywhere in that pipeline
        # renders lightness-FLIPPED ink (pale crayons became olive/black
        # on the real iPad, M3 gate). One appearance, no pairs to flip.
        UIUserInterfaceStyle: Light
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "2" # iPad only
        SUPPORTS_MACCATALYST: false
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

  # App-side logic tests — for code that needs UIKit/PencilKit and so can't
  # live in CBNKit's SwiftPM tests (which must stay UI-framework-free):
  # today that's InkCoverage's pixel measurement. Hosted in the app
  # (xcodegen wires TEST_HOST automatically from the dependency) so
  # @testable import reaches app-target types.
  ColorByNumbersTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ColorByNumbersTests
    dependencies:
      - target: ColorByNumbers
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"

  # Runtime-verification driver, not a unit-test suite: drives the real app
  # through the studio/canvas flow on a simulator and captures screenshot
  # evidence (CBNKit's logic tests live in the SwiftPM package instead).
  ColorByNumbersUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ColorByNumbersUITests
    dependencies:
      - target: ColorByNumbers
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"

# Explicit (not the target-level `scheme:` shorthand) so Run pins to
# Release on purpose: xcodegen regenerates the WHOLE .xcodeproj, schemes
# included, from this file every time, so an Edit Scheme change made by
# hand in Xcode's UI never survives the next regen (bit Kevin on M4 --
# Cmd-R quietly reverted to Debug). Debug is ~30x slower for CBNKit's
# image work (region merging, quantization), which reads as a hung app on
# a real photo; Release is what Cmd-R needs to be testing on a real iPad
# to mean anything. Test stays Debug -- faster iteration, and the driven
# suite doesn't need real-photo performance to prove the flows work.
schemes:
  ColorByNumbers:
    build:
      targets:
        ColorByNumbers: all
    run:
      config: Release
    test:
      config: Debug
      targets:
        - ColorByNumbersTests
        - ColorByNumbersUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
